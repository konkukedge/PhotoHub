<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDGE Photo Hub</title>
    
    <meta property="og:title" content="EDGE Photo Hub">
    <meta property="og:description" content="EDGE 스터디 및 행사 사진 아카이브 모음입니다.">
    <meta property="og:image" content="https://konkukedge.github.io/PhotoHub/Preview.jpg">
    <meta property="og:url" content="https://konkukedge.github.io/PhotoHub/">
    
    <style>
        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: #f8f9fa;
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 40px;
        }

        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .gallery-item {
            background-color: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-decoration: none;
            color: #333;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .gallery-item img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }

        .info-box {
            padding: 15px;
        }

        .info-box h3 {
            margin: 0;
            font-size: 1rem;
            line-height: 1.3;
            color: #222;
        }
    </style>
</head>
<body>
